// Supabase Auth Client
const supabaseAuth = {
  // Get current session
  getSession: async () => {
    try {
      const token = localStorage.getItem('fe_access_token');
      const user = localStorage.getItem('fe_user');
      if (!token || !user) return { data: { session: null } };
      
      // Verify token is still valid
      const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
        headers: {
          'Authorization': `Bearer ${token}`,
          'apikey': SUPABASE_ANON_KEY
        }
      });
      
      if (!res.ok) {
        localStorage.removeItem('fe_access_token');
        localStorage.removeItem('fe_user');
        return { data: { session: null } };
      }
      
      const userData = await res.json();
      return { data: { session: { user: userData, access_token: token } } };
    } catch(e) {
      return { data: { session: null } };
    }
  },

  // Sign up with email and password
  signUp: async ({ email, password, options }) => {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({
          email,
          password,
          data: options?.data || {}
        })
      });
      const data = await res.json();
      if (data.error) return { data: null, error: { message: data.error.message || data.msg || 'Signup failed' } };
      if (data.access_token) {
        localStorage.setItem('fe_access_token', data.access_token);
        localStorage.setItem('fe_user', JSON.stringify(data.user));
      }
      return { data: { user: data.user, session: data.access_token ? { user: data.user, access_token: data.access_token } : null }, error: null };
    } catch(e) {
      return { data: null, error: { message: 'Network error. Please try again.' } };
    }
  },

  // Sign in with email and password
  signInWithPassword: async ({ email, password }) => {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.error || data.error_description) return { data: null, error: { message: data.error_description || data.error || 'Invalid email or password.' } };
      localStorage.setItem('fe_access_token', data.access_token);
      localStorage.setItem('fe_user', JSON.stringify(data.user));
      if (data.refresh_token) localStorage.setItem('fe_refresh_token', data.refresh_token);
      return { data: { user: data.user, session: { user: data.user, access_token: data.access_token } }, error: null };
    } catch(e) {
      return { data: null, error: { message: 'Network error. Please try again.' } };
    }
  },

  // Sign in with Google OAuth
  signInWithGoogle: async () => {
    try {
      const redirectTo = encodeURIComponent(window.location.href.split('#')[0]);
      const googleAuthUrl = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${redirectTo}`;
      window.location.href = googleAuthUrl;
      return { error: null };
    } catch(e) {
      return { error: { message: 'Google sign in failed. Please use email login instead.' } };
    }
  },

  // Sign out
  signOut: async () => {
    try {
      const token = localStorage.getItem('fe_access_token');
      if (token) {
        await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'apikey': SUPABASE_ANON_KEY
          }
        });
      }
    } catch(e) {}
    localStorage.removeItem('fe_access_token');
    localStorage.removeItem('fe_user');
    localStorage.removeItem('fe_refresh_token');
    return { error: null };
  },

  // Reset password
  resetPasswordForEmail: async ({ email }) => {
    try {
      const redirectTo = window.location.origin + window.location.pathname;
      const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ email, gotrue_meta_security: {} })
      });
      const data = await res.json();
      if (data.error) return { error: { message: data.error.message || 'Could not send reset email.' } };
      return { error: null };
    } catch(e) {
      return { error: { message: 'Network error. Please try again.' } };
    }
  },

  // Handle OAuth callback (called on page load)
  handleOAuthCallback: async () => {
    const hash = window.location.hash;
    if (!hash) return null;
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if (accessToken) {
      localStorage.setItem('fe_access_token', accessToken);
      if (refreshToken) localStorage.setItem('fe_refresh_token', refreshToken);
      // Get user details
      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: { 'Authorization': `Bearer ${accessToken}`, 'apikey': SUPABASE_ANON_KEY }
        });
        const user = await res.json();
        localStorage.setItem('fe_user', JSON.stringify(user));
        // Clean URL
        window.history.replaceState({}, document.title, window.location.pathname);
        return { user, access_token: accessToken };
      } catch(e) { return null; }
    }
    return null;
  }
};

function Ring({score}){
  const r=33,circ=2*Math.PI*r,fill=(score/100)*circ;
  const col=score>=80?"#35d49a":score>=50?"#e9a025":"#f87272";
  return(<div className="ring-w"><svg width="78" height="78" viewBox="0 0 78 78"><circle cx="39" cy="39" r={r} fill="none" stroke="#252535" strokeWidth="6"/><circle cx="39" cy="39" r={r} fill="none" stroke={col} strokeWidth="6" strokeDasharray={`${fill} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray .5s ease"}}/></svg><div className="ring-in"><div className="ring-num" style={{color:col}}>{score}</div><div className="ring-lbl">/ 100</div></div></div>);
}

function Toolbar({taRef,value,onChange}){
  const ins=ch=>{const el=taRef?.current;if(!el){onChange(value+ch);return;}const s=el.selectionStart,e=el.selectionEnd;onChange(value.slice(0,s)+ch+value.slice(e));setTimeout(()=>{el.focus();el.setSelectionRange(s+ch.length,s+ch.length);},0);};
  const fmt=map=>{const el=taRef?.current;if(!el)return;const s=el.selectionStart,e=el.selectionEnd;const sel=value.slice(s,e);if(!sel)return;const mapped=sel.split("").map(c=>map[c]||c).join("");onChange(value.slice(0,s)+mapped+value.slice(e));setTimeout(()=>{el.focus();el.setSelectionRange(s,s+mapped.length);},0);};
  return(<div className="tb"><div className="tb-row"><button className="ufmt" onClick={()=>fmt(BOLD_MAP)}>𝗕</button><button className="ufmt" onClick={()=>fmt(ITALIC_MAP)}>𝘐</button><div className="tb-sep"/>{UNICODE_CHARS.map((g,gi)=>(<span key={gi} style={{display:"contents"}}>{g.items.map(([ch,lbl])=>(<button key={ch} className="ub" title={lbl} onClick={()=>ins(ch)}>{ch}</button>))}{gi<UNICODE_CHARS.length-1&&<div className="tb-sep"/>}</span>))}</div></div>);
}

function ProfileSwitcher({profiles,activeId,setActiveId,addProfile,plan}){
  const [open,setOpen]=useState(false);
  const active=profiles.find(p=>p.id===activeId)||profiles[0];
  const planInfo=PLANS[plan];
  return(<div className="sb-ps"><div className="ps-hd" onClick={()=>setOpen(o=>!o)}><div className="ps-av">{initials(active?.name||active?.title||"?")}</div><div className="ps-nm">{active?.name||active?.title?.split("|")[0]?.trim()||active?.title||"Set up profile"}</div><div className={`ps-ch ${open?"open":""}`}>▾</div></div>{open&&(<div className="ps-dd">{profiles.map(p=>(<div key={p.id} className={`ps-it ${p.id===activeId?"on":""}`} onClick={()=>{setActiveId(p.id);setOpen(false);}}><div className="ps-dot"/>{p.name||p.title?.split("|")[0]?.trim()||"Unnamed Profile"}{p.importedFrom==="upwork"&&<span style={{fontSize:9,background:"var(--gd)",color:"var(--gold)",padding:"1px 5px",borderRadius:4,marginLeft:"auto"}}>UW</span>}</div>))}{profiles.length<planInfo.profiles?(<div className="ps-add" onClick={()=>{addProfile();setOpen(false);}}>+ Add Profile</div>):(<div className="ps-locked">Upgrade for more profiles</div>)}</div>)}</div>);
}

function AuthPage({onAuth}){

  const [loading,setLoading]=useState(false); const [error,setError]=useState(""); const [resetSent,setResetSent]=useState(false);
  const pw=pwStrength(password);

  const doLogin=async()=>{
    if(!email.trim()||!password){setError("Please fill in all fields.");return;}
    setError("");setLoading(true);
    const {data,error:err}=await fakeAuth.signInWithPassword({email:email.trim(),password});
    setLoading(false);
    if(err){setError(err.message);return;}
    if(data?.session) onAuth(data.session);
  };

  const doSignup=async()=>{
    if(!name.trim()){setError("Please enter your name.");return;}
    if(!email.trim()){setError("Please enter your email.");return;}
    if(password.length<8){setError("Password must be at least 8 characters.");return;}
    if(!agreed){setError("Please agree to the Terms of Service.");return;}
    setError("");setLoading(true);
    const {data,error:err}=await fakeAuth.signUp({email:email.trim(),password,options:{data:{full_name:name.trim()}}});
    setLoading(false);
    if(err){setError(err.message);return;}
    if(data?.session) onAuth(data.session);
    else{setVerifyEmail(email.trim());setMode("verify");}
  };

  const doGoogle=async()=>{
    setLoading(true);setError("");
    const {error:err}=await fakeAuth.signInWithGoogle();
    if(err){setError(err.message);setLoading(false);}
    // If no error, page will redirect to Google — no need to setLoading(false)
  };

  const doReset=async()=>{
    if(!email.trim()){setError("Enter your email first.");return;}
    setError("");setLoading(true);
    const {error:err}=await fakeAuth.resetPasswordForEmail({email:email.trim()});
    setLoading(false);
    if(err){setError(err.message);return;}
    setResetSent(true);

        </div>
        <div style={{fontSize:11,color:"var(--m1)",lineHeight:1.6}}>© 2025 FreelancEdge™ · Based in Botswana 🇧🇼<br/>Not affiliated with Upwork Inc.</div>

function Dashboard({profile,history,usage,plan,setTab,userName}){
  const score=calcScore(profile);
  const sent=history.length,viewed=history.filter(h=>h.status==="viewed"||h.status==="replied").length,replied=history.filter(h=>h.status==="replied").length;
  const planInfo=PLANS[plan],usedPct=Math.min(100,Math.round(usage/planInfo.proposals*100));
  return(<div className="content fade">
    <div className="stat-row">
      {[{v:sent,l:"Proposals Sent",c:"var(--txt)"},{v:viewed,l:"Viewed",c:"var(--blu)"},{v:replied,l:"Replies",c:"var(--grn)"},{v:`${score}%`,l:"Profile Score",c:score>=80?"var(--grn)":score>=50?"var(--gold)":"var(--red)"}].map(s=>(<div key={s.l} className="stat"><div className="sv" style={{color:s.c}}>{s.v}</div><div className="sl">{s.l}</div></div>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
      <div className="card"><div className="ct"><div className="ci ci-g">📊</div><div><div className="c-title">Monthly Usage</div><div className="c-sub">{planInfo.name} Plan</div></div></div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}><div style={{fontSize:20,fontWeight:900,color:"var(--gold)"}}>{usage}<span style={{fontSize:13,color:"var(--m1)",fontWeight:400}}> / {planInfo.proposals}</span></div><div style={{fontSize:11,color:"var(--m1)"}}>{planInfo.proposals-usage} left</div></div><div className="plan-bar"><div className="plan-fill" style={{width:`${usedPct}%`,background:usedPct>85?"var(--red)":"var(--gold)"}}/></div><button className="btn btn-ghost btn-sm btn-full" style={{marginTop:6}} onClick={()=>setTab("pricing")}>View plans →</button></div>
      <div className="card"><div className="ct" style={{marginBottom:10}}><div className="ci ci-d">⚡</div><div className="c-title">Quick Actions</div></div>{[{ico:"✦",l:"Generate a Proposal",t:"generate",c:"var(--gold)"},{ico:"📥",l:"Import Upwork Profile",t:"import",c:"var(--blu)"},{ico:"🚀",l:"Optimize My Profile",t:"optimizer",c:"var(--pur)"}].map(a=>(<button key={a.t} className="btn btn-dark btn-full btn-sm" style={{justifyContent:"flex-start",gap:10,marginBottom:7}} onClick={()=>setTab(a.t)}><span style={{color:a.c}}>{a.ico}</span>{a.l}</button>))}</div>
    </div>
    <div className="card"><div className="ct"><div className="ci ci-d">🕐</div><div className="c-title">Recent Proposals</div><button className="btn btn-ghost btn-xs mla" onClick={()=>setTab("history")}>View all →</button></div>{history.length===0?<div style={{textAlign:"center",padding:"20px",color:"var(--m1)",fontSize:13}}>No proposals yet. <span style={{color:"var(--gold)",cursor:"pointer"}} onClick={()=>setTab("generate")}>Generate your first →</span></div>:history.slice(0,4).map(h=>(<div key={h.id} style={{display:"flex",alignItems:"center",gap:11,padding:"9px 0",borderBottom:"1px solid var(--b1)"}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{h.jobTitle||"Untitled"}</div><div style={{fontSize:11,color:"var(--m1)"}}>{h.date}</div></div><span className={`sp sp-${h.status}`}>{h.status}</span></div>))}</div>
    {score<50&&(<div className="card gold"><div className="ct"><div className="ci ci-g">⚠️</div><div className="c-title">Complete your profile</div></div><div style={{fontSize:13,color:"var(--m2)",lineHeight:1.7,marginBottom:13}}>A complete profile produces better, more personalized proposals.</div><div className="fx g8"><button className="btn btn-gold" onClick={()=>setTab("profile")}>Complete Profile</button><button className="btn btn-ghost" onClick={()=>setTab("import")}>📥 Import from Upwork</button></div></div>)}
  </div>);
}

// ═══════════════════════════════════════
// GENERATE
// ═══════════════════════════════════════
function Generate({profile,templates,addHistory,usage,setUsage,plan}){
  const [jobTitle,setJobTitle]=useState(""); const [jobDesc,setJobDesc]=useState(""); const [selTmpl,setSelTmpl]=useState(templates[0]?.id||"");
  const [tone,setTone]=useState("professional"); const [length,setLength]=useState("medium");
  const [loading,setLoading]=useState(false); const [proposal,setProposal]=useState(""); const [error,setError]=useState("");
  const [saved,setSaved]=useState(false); const [copied,setCopied]=useState(false);
  const taRef=useRef(null);
  const planInfo=PLANS[plan],remaining=planInfo.proposals-usage;
  const generate=async()=>{
    if(!jobDesc.trim()){setError("Please paste the job description.");return;}
    if(remaining<=0){setError("Monthly limit reached. Please upgrade.");return;}
    setError("");setLoading(true);setProposal("");setSaved(false);setCopied(false);
    const tmpl=templates.find(t=>t.id===selTmpl);
    const lmap={short:"80-120 words",medium:"130-180 words",long:"180-230 words"};
    const sys=`You are an elite Upwork proposal writer. Write proposals that are specific, human, and compelling. NEVER use: "I am writing to apply", "I noticed your posting", "I believe I am a great fit", "I am excited", "I look forward". Start with a bold hook. Respond ONLY with the proposal text.`;
    const pCtx=profile.name?`FREELANCER:\nName: ${profile.name}\nTitle: ${profile.title||"Freelancer"}\nRate: $${profile.hourlyRate||"?"}/hr\nSkills: ${profile.skills||"not listed"}\nBio: ${profile.bio||"not provided"}\nAI Context: ${profile.aiContext||"none"}\nPortfolio: ${profile.portfolio?.filter(x=>x.title).map(x=>`${x.title}${x.result?" — "+x.result:""}`).join("; ")||"none"}${profile.upworkStats?.jobSuccess?`\nUpwork Job Success: ${profile.upworkStats.jobSuccess}`:""}`:
    "FREELANCER: No profile set. Write a strong generic proposal.";
    const usr=`JOB TITLE: ${jobTitle||"Not specified"}\nJOB DESCRIPTION:\n${jobDesc}\n\n${pCtx}\n\nINSTRUCTIONS:\n- Tone: ${tone}\n- Length: ${lmap[length]}\n- Strategy: ${tmpl?.prompt||"Write a compelling cover letter."}`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":window._feApiKey||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,system:sys,messages:[{role:"user",content:usr}]})});
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"Could not generate. Try again.";
      setProposal(text);setUsage(u=>u+1);
    }catch{setError("Network error. Please try again.");}
    finally{setLoading(false);}
  };
  const copy=()=>{navigator.clipboard.writeText(proposal);setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const saveH=()=>{addHistory({id:Date.now(),jobTitle:jobTitle||"Untitled Job",proposal,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),status:"sent",tone,template:templates.find(t=>t.id===selTmpl)?.name});setSaved(true);};
  return(<div className="content fade"><div style={{display:"grid",gridTemplateColumns:"1fr 370px",gap:14}}>
    <div>
      <div className="card"><div className="ct"><div className="ci ci-d">📋</div><div><div className="c-title">Job Details</div><div className="c-sub">Paste the Upwork job posting</div></div></div>
        <div className="fg"><div className="lbl">Job Title</div><input placeholder="e.g. React Developer for SaaS Analytics Dashboard" value={jobTitle} onChange={e=>setJobTitle(e.target.value)}/></div>
        <div className="fg"><div className="lbl">Job Description</div><textarea rows={5} placeholder="Paste the full job description here…" value={jobDesc} onChange={e=>setJobDesc(e.target.value)}/></div>
      </div>
      <div className="card"><div className="ct"><div className="ci ci-g">🎨</div><div className="c-title">Settings</div></div>
        <div className="lbl" style={{marginBottom:7}}>Tone</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:13}}>{TONES.map(t=>(<button key={t.id} onClick={()=>setTone(t.id)} className="btn btn-dark btn-sm" style={{borderColor:tone===t.id?"var(--gold)":"var(--b1)",color:tone===t.id?"var(--gold)":"var(--m2)",background:tone===t.id?"var(--gd)":"var(--s2)"}}>{t.icon} {t.label}</button>))}</div>
        <div className="lbl" style={{marginBottom:7}}>Length</div>
        <div style={{display:"flex",gap:5}}>{LENGTHS.map(l=>(<button key={l.id} onClick={()=>setLength(l.id)} className="btn btn-dark btn-sm" style={{flex:1,flexDirection:"column",gap:1,height:50,borderColor:length===l.id?"var(--gold)":"var(--b1)",color:length===l.id?"var(--gold)":"var(--m2)",background:length===l.id?"var(--gd)":"var(--s2)"}}><span style={{fontSize:13,fontWeight:700}}>{l.label}</span><span style={{fontSize:10,opacity:.7}}>{l.sub}</span></button>))}</div>
      </div>
      <div className="card"><div className="ct"><div className="ci ci-d">🗂️</div><div><div className="c-title">Template Strategy</div></div></div>
        <div className="tmpl-g">{templates.map(t=>(<div key={t.id} className={`tmpl ${selTmpl===t.id?"sel":""}`} onClick={()=>setSelTmpl(t.id)}>{selTmpl===t.id&&<div className="tmpl-chk">✦</div>}<div className="tmpl-tone">{t.tone}</div><div className="tmpl-name">{t.name}</div><div className="tmpl-desc">{t.desc}</div></div>))}</div>
      </div>
      {error&&<div className="alert a-g">{error}</div>}
      <div className="fx g8"><button className="btn btn-gold btn-lg" style={{flex:1}} onClick={generate} disabled={loading||remaining<=0}>{loading?<><span className="spin"/> Generating…</>:proposal?"↺ Regenerate":"✦ Generate Proposal"}</button>{proposal&&<button className="btn btn-dark btn-lg" onClick={saveH} disabled={saved}>{saved?"✓ Saved":"Save"}</button>}</div>
      {remaining<=5&&remaining>0&&<div style={{fontSize:11,color:"var(--gold)",marginTop:5,textAlign:"center"}}>{remaining} proposals left this month</div>}
    </div>
    <div>
      {proposal?(<div className="card fade"><div className="ct"><div className="ci ci-g">✍️</div><div className="c-title">Your Proposal</div><button className="btn btn-dark btn-xs mla" onClick={copy}>{copied?"✓ Copied":"Copy"}</button></div><Toolbar taRef={taRef} value={proposal} onChange={setProposal}/><div className="prop-w"><textarea ref={taRef} className="prop-area" value={proposal} onChange={e=>setProposal(e.target.value)} rows={11}/><div className="prop-cc">{proposal.length} chars</div></div>{saved&&<div className="alert a-n mt8">✓ Saved to history</div>}</div>):(<div className="card" style={{minHeight:380,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}}>{loading?<><div style={{fontSize:28,marginBottom:14}}>✦</div><div style={{fontSize:14,fontWeight:600,marginBottom:6}}>Crafting your proposal…</div></>:<><div style={{fontSize:28,marginBottom:11,opacity:.25}}>✍️</div><div style={{fontSize:14,fontWeight:600,color:"var(--m2)",marginBottom:5}}>Proposal appears here</div><div style={{fontSize:12,color:"var(--m1)"}}>Fill in job details and click Generate</div></>}</div>)}
      <div className="card mt8"><div className="ct" style={{marginBottom:9}}><div className="ci ci-d">👤</div><div className="c-title">Profile In Use</div></div><div style={{fontSize:12,color:"var(--m2)",lineHeight:1.7}}><div><strong style={{color:"var(--txt)"}}>{profile.name||"No name — set up profile"}</strong></div>{profile.hourlyRate&&<div style={{color:"var(--grn)",fontWeight:600}}>${profile.hourlyRate}/hr</div>}{profile.importedFrom==="upwork"&&<div style={{fontSize:11,color:"var(--gold)"}}>📥 Imported from Upwork</div>}{profile.skills&&<div style={{marginTop:3,color:"var(--m1)"}}>{profile.skills.split(",").slice(0,4).join(", ")}</div>}</div></div>
    </div>
  </div></div>);
}

// ═══════════════════════════════════════
// IMPORT WIZARD
// ═══════════════════════════════════════
function Import({onImported,setTab}){
  const [step,setStep]=useState(0); const [method,setMethod]=useState("extension");
  const [pasteText,setPasteText]=useState(""); const [urlVal,setUrlVal]=useState("");
  const [manForm,setManForm]=useState({name:"",title:"",hourlyRate:"",availability:"",bio:"",skills:""});
  const [loading,setLoading]=useState(false); const [simState,setSimState]=useState("idle");
  const [editData,setEditData]=useState(null); const [aiCtx,setAiCtx]=useState(""); const [aiCtxLoading,setAiCtxLoading]=useState(false);
  const [error,setError]=useState("");

  const MOCK={name:"Sarah Johnson",title:"Full-Stack Developer | React & Node.js Specialist",hourlyRate:"85",bio:"I help startups and scale-ups build fast, reliable web applications. With 7+ years of experience in React, Node.js, and cloud infrastructure, I've delivered 40+ projects across fintech, healthtech, and SaaS.",skills:["React.js","Node.js","TypeScript","PostgreSQL","AWS","Docker","GraphQL","Next.js"],jobSuccess:"98%",earnings:"$50K+",portfolio:[{title:"FinTrack Finance SaaS",description:"Full-stack app with real-time bank integrations.",result:"Grew to 8,000 users in 3 months"},{title:"HealthDesk Patient Portal",description:"HIPAA-compliant portal with EHR integration.",result:"Reduced no-shows by 34%"},{title:"E-commerce Rebuild",description:"Migrated PHP monolith to React + Node.",result:"Page load 8s → 1.2s, conversions +22%"}],availability:"Full-time (40h/week)",categories:["Web Development","DevOps / Cloud"]};

  const simExtract=()=>{setSimState("run");setTimeout(()=>{setSimState("done");setTimeout(()=>{setEditData({...MOCK});setStep(2);},600);},2200);};
  const extractPaste=async()=>{
    if(pasteText.trim().length<100){setError("Paste more profile text for better extraction.");return;}
    setError("");setLoading(true);
    const sys=`Extract structured data from pasted Upwork profile text. Return ONLY valid JSON: {"name":"","title":"","hourlyRate":"","bio":"","skills":[],"portfolio":[{"title":"","description":"","result":""}],"availability":"","jobSuccess":"","earnings":"","categories":[]}`;
    try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":window._feApiKey||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,system:sys,messages:[{role:"user",content:`Extract from:\n\n${pasteText}`}]})});const data=await res.json();const raw=data.content?.find(b=>b.type==="text")?.text||"{}";const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());setEditData({...parsed});setStep(2);}catch{setError("Could not parse. Try more complete profile text.");}finally{setLoading(false);}
  };
  const procManual=()=>{const d={...manForm,skills:manForm.skills.split(",").map(s=>s.trim()).filter(Boolean),portfolio:[],categories:[]};setEditData({...d});setStep(2);};
  const genAiCtx=async()=>{
    if(!editData)return;setAiCtxLoading(true);
    const sys=`Write a powerful "AI Context" field for an Upwork freelancer — private notes to help AI generate winning proposals. Include: top 3 differentiators, key achievements with numbers, ideal client type, strongest skills. First person. 150-200 words.`;
    const usr=`Name: ${editData.name}\nTitle: ${editData.title}\nBio: ${editData.bio}\nSkills: ${Array.isArray(editData.skills)?editData.skills.join(", "):editData.skills}\nPortfolio: ${editData.portfolio?.map(p=>`${p.title}: ${p.result}`).join("; ")}\nRate: $${editData.hourlyRate}/hr\nSuccess: ${editData.jobSuccess||"high"}`;
    try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":window._feApiKey||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:sys,messages:[{role:"user",content:usr}]})});const data=await res.json();setAiCtx(data.content?.find(b=>b.type==="text")?.text||"");}catch{setAiCtx("Could not generate. Write this manually.");}finally{setAiCtxLoading(false);}
  };
  const doImport=()=>{
    const d=editData;
    const skills=Array.isArray(d.skills)?d.skills.join(", "):d.skills||"";
    const profile={id:"p"+Date.now(),name:d.name||"",title:d.title||"",bio:d.bio||"",aiContext:aiCtx,hourlyRate:d.hourlyRate||"",availability:d.availability||"",skills,categories:d.categories||[],portfolio:(d.portfolio||[]).map(p=>({title:p.title||"",description:p.description||"",url:p.url||"",result:p.result||""})),importedFrom:"upwork",importedAt:new Date().toISOString(),upworkStats:{jobSuccess:d.jobSuccess,earnings:d.earnings}};
    onImported(profile);setStep(3);
  };

  const FMAP=[{src:"name",tgt:"Name",st:editData?.name?"ok":"skip"},{src:"title",tgt:"Title",st:editData?.title?"ok":"skip"},{src:"hourlyRate",tgt:"Hourly Rate",st:editData?.hourlyRate?"ok":"warn"},{src:"bio",tgt:"Bio",st:(editData?.bio?.length||0)>50?"ok":(editData?.bio?"warn":"skip")},{src:"skills",tgt:"Skills",st:(Array.isArray(editData?.skills)?editData.skills.length:(editData?.skills?.split(",").filter(Boolean).length||0))>0?"ok":"skip"},{src:"portfolio",tgt:"Portfolio",st:(editData?.portfolio?.length||0)>0?"ok":"warn"},{src:"jobSuccess",tgt:"Job Success",st:editData?.jobSuccess?"ok":"skip"},{src:"earnings",tgt:"Earned",st:editData?.earnings?"ok":"skip"}];

  const Steps=()=>(<div className="step-bar">{["Choose Method","Extract Data","Review & Edit","Complete"].map((s,i)=>(<div key={s} className="fx" style={{flex:i<3?"1":"0"}}><div className={`fx g4 ${i<step?"sdone":i===step?"sactive":""}`}><div className="step-n">{i<step?"✓":i+1}</div><div className="step-lb">{s}</div></div>{i<3&&<div className={`step-line ${i<step?"ldone":""}`}/>}</div>))}</div>);

  return(<div className="content fade"><Steps/>
    {step===0&&(<div className="fade">
      <div className="card gold"><div className="ct"><div className="ci ci-g">📥</div><div><div className="c-title">Import from Upwork</div><div className="c-sub">Transfer your Upwork profile data to FreelancEdge instantly.</div></div></div>
        <div className="method-g">
          {[{id:"extension",ico:"🔌",nm:"Chrome Extension",ds:"Visit your Upwork profile and click the FreelancEdge button to auto-extract.",badge:"Recommended",bc:"mb-g"},{id:"paste",ico:"📋",nm:"Paste Profile Text",ds:"Copy your Upwork profile page, paste it here, AI extracts everything.",badge:"No Extension Needed",bc:"mb-b"},{id:"url",ico:"✏️",nm:"Fill Manually",ds:"Enter your profile URL and fill in your info with our guided form.",badge:"Manual",bc:"mb-n"}].map(m=>(<div key={m.id} className={`method ${method===m.id?"sel":""}`} onClick={()=>setMethod(m.id)}><div className="method-ico">{m.ico}</div><div className="method-nm">{m.nm}</div><div className="method-ds">{m.ds}</div><div className={`method-badge ${m.bc}`}>{m.badge}</div></div>))}
        </div>
        <button className="btn btn-gold btn-lg btn-full" onClick={()=>setStep(1)}>Continue →</button>
      </div>
    </div>)}

    {step===1&&(<div className="fade">
      {method==="extension"&&(<div className="card gold">
        <div className="ct"><div className="ci ci-g">🔌</div><div><div className="c-title">Extract via Chrome Extension</div></div></div>
        {[{n:"1",t:"Open your Upwork profile",d:"Go to upwork.com → your public freelancer profile page."},{n:"2",t:"Click FreelancEdge icon",d:"Find it in your Chrome toolbar. Click to open the popup."},{n:"3",t:'Click "Import to FreelancEdge"',d:"The extension reads your profile and sends it here automatically."}].map(s=>(<div key={s.n} style={{display:"flex",gap:12,padding:"12px 0",borderBottom:"1px solid var(--b1)"}}><div style={{width:24,height:24,background:"var(--gold)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"#000",flexShrink:0,marginTop:2}}>{s.n}</div><div><div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{s.t}</div><div style={{fontSize:12,color:"var(--m2)",lineHeight:1.6}}>{s.d}</div></div></div>))}
        <div style={{background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:"var(--r)",padding:14,marginTop:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--gold)",marginBottom:5}}>🧪 Demo Mode — Try it now</div>
          <div style={{fontSize:12,color:"var(--m2)",marginBottom:11}}>No extension yet? Simulate extraction with a sample Upwork profile.</div>
          <button className="btn btn-gold btn-sm" onClick={simExtract} disabled={simState!=="idle"}>{simState==="idle"&&"▶ Simulate Extraction"}{simState==="run"&&<><span className="spin"/> Extracting profile data…</>}{simState==="done"&&"✓ Moving to review…"}</button>
          {simState==="run"&&<div className="prog-bg"><div className="prog-fl" style={{width:"70%"}}/></div>}
        </div>
      </div>)}
      {method==="paste"&&(<div className="card">
        <div className="ct"><div className="ci ci-b">📋</div><div><div className="c-title">Paste Your Profile Text</div><div className="c-sub">Copy your full Upwork profile page and paste below.</div></div></div>
        <div className="alert a-b" style={{marginBottom:13}}><strong>How to copy:</strong> Go to your Upwork profile → Press Ctrl+A → Ctrl+C → paste below.</div>
        <div className="paste-a"><textarea placeholder="Paste your full Upwork profile text here — bio, skills, work history, portfolio, rates…" value={pasteText} onChange={e=>setPasteText(e.target.value)}/></div>
        <div className="hlp" style={{marginBottom:11}}>{pasteText.length} characters{pasteText.length>500?" — good ✓":" — paste more for best results"}</div>
        {error&&<div className="alert a-r">{error}</div>}
        <button className="btn btn-gold btn-lg btn-full" onClick={extractPaste} disabled={loading||pasteText.trim().length<50}>{loading?<><span className="spin"/> AI extracting data…</>:"✦ Extract Profile Data →"}</button>
      </div>)}
      {method==="url"&&(<div className="card">
        <div className="ct"><div className="ci ci-n">✏️</div><div className="c-title">Guided Manual Import</div></div>
        <div className="fg"><div className="lbl">Upwork Profile URL</div><div className="url-w"><div className="url-ico">🔗</div><input className="url-in" placeholder="https://www.upwork.com/freelancers/~yourhandle" value={urlVal} onChange={e=>setUrlVal(e.target.value)}/>{urlVal&&<div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:11,fontWeight:700,color:urlVal.includes("upwork.com")?"var(--grn)":"var(--red)"}}>{urlVal.includes("upwork.com")?"✓":"✗"}</div>}</div></div>
        <div style={{borderTop:"1px solid var(--b1)",marginBottom:14,paddingTop:14}}/>
        <div className="gr gr2" style={{marginBottom:11}}><div className="fg"><div className="lbl">Full Name</div><input placeholder="Jane Smith" value={manForm.name} onChange={e=>setManForm(f=>({...f,name:e.target.value}))}/></div><div className="fg"><div className="lbl">Title</div><input placeholder="React Developer" value={manForm.title} onChange={e=>setManForm(f=>({...f,title:e.target.value}))}/></div></div>
        <div className="gr gr2" style={{marginBottom:11}}><div className="fg"><div className="lbl">Hourly Rate</div><input type="number" placeholder="75" value={manForm.hourlyRate} onChange={e=>setManForm(f=>({...f,hourlyRate:e.target.value}))}/></div><div className="fg"><div className="lbl">Availability</div><select value={manForm.availability} onChange={e=>setManForm(f=>({...f,availability:e.target.value}))}><option value="">Select…</option>{AVAIL.map(a=><option key={a} value={a}>{a}</option>)}</select></div></div>
        <div className="fg" style={{marginBottom:11}}><div className="lbl">Bio</div><textarea rows={3} placeholder="Paste your Upwork bio here…" value={manForm.bio} onChange={e=>setManForm(f=>({...f,bio:e.target.value}))}/></div>
        <div className="fg" style={{marginBottom:18}}><div className="lbl">Skills (comma-separated)</div><input placeholder="React, Node.js, TypeScript…" value={manForm.skills} onChange={e=>setManForm(f=>({...f,skills:e.target.value}))}/></div>
        <button className="btn btn-gold btn-lg btn-full" onClick={procManual} disabled={!manForm.name||!manForm.title}>Continue to Review →</button>
      </div>)}
      <button className="btn btn-ghost btn-sm mt8" onClick={()=>setStep(0)}>← Back</button>
    </div>)}

const UPWORK_SKILLS_LIST = ["n8n","OpenAI API","AI Agent Development","Lead Generation","CRM Automation","Email Automation","WhatsApp Chatbot","HubSpot","Salesforce","Airtable","API Integration","Google Ads","Facebook Ads","Digital Marketing","Chatbot Development","Machine Learning","Deep Learning","Python","JavaScript","TypeScript","React","Node.js","Vue.js","Angular","PHP","WordPress","Shopify","Webflow","Figma","Adobe XD","UI/UX Design","Graphic Design","Video Editing","Content Writing","Copywriting","SEO","Social Media Marketing","Data Analysis","Excel","SQL","PostgreSQL","MongoDB","AWS","Google Cloud","Docker","REST API","Web Scraping","Zapier","Make","Notion","Asana","Project Management","Blockchain","Solidity","Swift","Kotlin","Flutter","React Native"];

function calcProfileScore(p){
  let s=0;
  if(p.hasPhoto) s+=12;
  if(p.title?.trim()&&p.title.length>=20) s+=18;
  if(p.bio?.length>=200) s+=20;
  if(p.bio?.length>=400) s+=5;
  if(p.hourlyRate) s+=12;
  const sc=p.skills?.split(",").filter(Boolean).length||0;
  if(sc>=3) s+=5; if(sc>=7) s+=7; if(sc>=12) s+=3;
  if(p.employment?.some(e=>e.company?.trim())) s+=10;
  if(p.hasVideo||p.videoUrl) s+=8;
  return Math.min(100,s);
}

function ProfileSetup({profile, setProfile, setTab}){
  const [mode, setMode] = useState("view"); // view | setup

  const skillArr = profile.skills ? profile.skills.split(",").map(s=>s.trim()).filter(Boolean) : [];
  const suggestions = skillInput.length>1 ? UPWORK_SKILLS_LIST.filter(s=>s.toLowerCase().includes(skillInput.toLowerCase())&&!skillArr.includes(s)).slice(0,6) : [];
  const addSkill = s => { if(!s.trim()||skillArr.includes(s.trim())||skillArr.length>=15) return; setProfile(p=>({...p,skills:[...skillArr,s.trim()].join(", ")})); setSkillInput(""); setShowSug(false); };
  const removeSkill = s => setProfile(p=>({...p,skills:skillArr.filter(x=>x!==s).join(", ")}));

  // Employment
  const emp = profile.employment||[{company:"",title:"",from:"",to:"",current:false,description:""}];
  const upEmp = (i,f,v) => setProfile(p=>{const a=[...(p.employment||emp)];a[i]={...a[i],[f]:v};return{...p,employment:a};});

  const rmEmp = i => setProfile(p=>({...p,employment:(p.employment||emp).filter((_,idx)=>idx!==i)}));

  const up = (f,v) => setProfile(p=>({...p,[f]:v}));
  const save = () => { setMsg("saving"); setTimeout(()=>{ const d={...profile,setupComplete:true}; setProfile(d); stor.set("fe_profile",d); setMsg("saved"); setMode("view"); setTimeout(()=>setMsg(""),2000); },400); };
  const score = calcProfileScore(profile);

  // Extract from pasted text using Claude
  const extractFromPaste = async () => {
    if(pasteText.trim().length < 80){ setExtractErr("Please paste more text from your Upwork profile."); return; }
    setExtracting(true); setExtractErr("");
    const sys=`Extract Upwork profile data from pasted text. Return ONLY JSON with these exact fields: {"title":"string","bio":"string","hourlyRate":"string(number only)","skills":["string"],"employment":[{"company":"string","title":"string","from":"string","to":"string","current":false,"description":"string"}]}. If a field is not found leave it empty string or empty array.`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":window._feApiKey||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:`Extract profile data from this Upwork profile text:\n\n${pasteText}`}]})});
      const data=await res.json();
      if(data.error) throw new Error(data.error.message);
      const raw=data.content?.find(b=>b.type==="text")?.text||"{}";
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setProfile(p=>({...p,
        title:parsed.title||p.title||"",
        bio:parsed.bio||p.bio||"",
        hourlyRate:parsed.hourlyRate||p.hourlyRate||"",
        skills:Array.isArray(parsed.skills)?parsed.skills.join(", "):(parsed.skills||p.skills||""),
        employment:parsed.employment?.length?parsed.employment:(p.employment||[]),
      }));

    }catch(e){
      // Fallback: manual parse key fields from text
      const rateMatch = pasteText.match(/\$?([\d,.]+)\s*\/\s*hr/i);
      const titleMatch = pasteText.split('\n').find(l=>l.length>10&&l.length<120&&!l.includes('http'));
      setProfile(p=>({...p,

                  <a href="https://www.upwork.com/profile" target="_blank" style={{fontSize:11,color:"var(--gold)"}}>Go to Upwork to upload ↗</a>
                </div>
              </div>
            </div>
          </div>

          {/* TITLE */}
          <div className="card" style={{marginBottom:12}}>
            <div className="ct"><div className="ci ci-d">🏷️</div><div><div className="c-title">Professional Title</div><div className="c-sub">Copy exactly from your Upwork profile</div></div><span style={{marginLeft:"auto",fontSize:11,color:(profile.title?.length||0)>80?"var(--red)":(profile.title?.length||0)>=20?"var(--grn)":"var(--m1)"}}>{profile.title?.length||0}/80</span></div>
            <input placeholder="e.g. AI Automation Specialist | Lead Generation | n8n | CRM Automation" value={profile.title||""} onChange={e=>up("title",e.target.value)}/>
            <div className="hlp" style={{marginTop:5}}>Paste your exact Upwork title. This is what appears in search results.</div>
          </div>

          {/* RATE */}
          <div className="card" style={{marginBottom:12}}>
            <div className="ct"><div className="ci ci-d">💰</div><div><div className="c-title">Hourly Rate</div><div className="c-sub">Your rate from Upwork profile</div></div></div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{position:"relative",width:130}}>
                <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"var(--m1)"}}>$</span>
                <input type="number" placeholder="20" value={profile.hourlyRate||""} onChange={e=>up("hourlyRate",e.target.value)} style={{paddingLeft:24}}/>
              </div>
              <span style={{color:"var(--m1)",fontSize:13}}>/hr USD</span>
            </div>
          </div>

          {/* OVERVIEW */}
          <div className="card" style={{marginBottom:12}}>
            <div className="ct"><div className="ci ci-d">✍️</div><div><div className="c-title">Professional Overview</div><div className="c-sub">Copy your full bio from Upwork — first 2 lines appear in search</div></div><span style={{marginLeft:"auto",fontSize:11,color:(profile.bio?.length||0)>=300?"var(--grn)":"var(--m1)"}}>{profile.bio?.length||0} chars</span></div>
            <textarea rows={7} placeholder="Paste your full Upwork overview/bio here…" value={profile.bio||""} onChange={e=>up("bio",e.target.value)}/>
          </div>

          {/* SKILLS */}
          <div className="card" style={{marginBottom:12}}>
            <div className="ct"><div className="ci ci-d">⚡</div><div><div className="c-title">Skills</div><div className="c-sub">Add your Upwork skills — up to 15</div></div><span style={{marginLeft:"auto",fontSize:11,color:skillArr.length>=10?"var(--grn)":skillArr.length>=5?"var(--gold)":"var(--m1)"}}>{skillArr.length}/15</span></div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10,minHeight:32}}>
              {skillArr.map(s=>(<span key={s} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,background:"var(--s2)",border:"1px solid var(--b1)",color:"var(--m2)",padding:"4px 10px",borderRadius:20}}>{s}<button onClick={()=>removeSkill(s)} style={{background:"none",border:"none",color:"var(--m1)",cursor:"pointer",fontSize:13,padding:0}}>×</button></span>))}
              {skillArr.length===0&&<span style={{fontSize:12,color:"var(--m1)",fontStyle:"italic"}}>Type skills below or paste comma-separated</span>}
            </div>
            <div style={{position:"relative"}}>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <input placeholder="Type a skill…" value={skillInput} onChange={e=>{setSkillInput(e.target.value);setShowSug(true);}} onKeyDown={e=>{if(e.key==="Enter"){addSkill(skillInput);}}} style={{flex:1}}/>
                <button className="btn btn-dark btn-sm" onClick={()=>addSkill(skillInput)} disabled={!skillInput.trim()}>Add</button>
              </div>
              {showSug&&suggestions.length>0&&(<div style={{position:"absolute",top:"100%",left:0,right:50,background:"var(--s1)",border:"1px solid var(--b1)",borderRadius:"var(--r)",zIndex:100,marginTop:2,boxShadow:"0 8px 24px rgba(0,0,0,.5)"}}>
                {suggestions.map(s=>(<div key={s} style={{padding:"8px 12px",fontSize:12,cursor:"pointer",color:"var(--m2)"}} onClick={()=>addSkill(s)} onMouseEnter={e=>e.target.style.background="var(--s2)"} onMouseLeave={e=>e.target.style.background="transparent"}>{s}</div>))}
              </div>)}
            </div>
            <div style={{fontSize:11,color:"var(--m1)"}}>Or paste all at once: <input placeholder="React, Node.js, Python…" style={{display:"inline",width:"auto",padding:"3px 8px",fontSize:11}} onChange={e=>{if(e.target.value.includes(",")){ e.target.value.split(",").forEach(s=>addSkill(s.trim())); e.target.value=""; }}}/></div>
          </div>

          {/* WORK HISTORY */}
          <div className="card" style={{marginBottom:12}}>
            <div className="ct"><div className="ci ci-d">💼</div><div><div className="c-title">Work History</div><div className="c-sub">Copy from your Upwork employment history section</div></div><button className="btn btn-ghost btn-xs mla" onClick={addEmp}>+ Add Job</button></div>
            {(profile.employment||emp).map((e,i)=>(<div key={i} style={{background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:"var(--r)",padding:"13px",marginBottom:10,position:"relative"}}>
              {(profile.employment||emp).length>1&&<button onClick={()=>rmEmp(i)} style={{position:"absolute",top:9,right:9,background:"none",border:"none",color:"var(--m1)",cursor:"pointer",fontSize:16}}>×</button>}
              <div className="gr gr2" style={{marginBottom:9}}>
                <div className="fg"><div className="lbl">Company</div><input placeholder="e.g. Mupane Gold Mine" value={e.company||""} onChange={v=>upEmp(i,"company",v.target.value)}/></div>
                <div className="fg"><div className="lbl">Your Role</div><input placeholder="e.g. IT Support Intern" value={e.title||""} onChange={v=>upEmp(i,"title",v.target.value)}/></div>
              </div>
              <div className="gr gr2" style={{marginBottom:9}}>
                <div className="fg"><div className="lbl">From</div><input type="month" value={e.from||""} onChange={v=>upEmp(i,"from",v.target.value)}/></div>
                <div className="fg"><div className="lbl">To</div><input type="month" value={e.to||""} onChange={v=>upEmp(i,"to",v.target.value)} disabled={e.current}/></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
                <input type="checkbox" id={`cur${i}`} checked={e.current||false} onChange={v=>upEmp(i,"current",v.target.checked)} style={{width:14,height:14}}/>
                <label htmlFor={`cur${i}`} style={{fontSize:12,color:"var(--m2)",cursor:"pointer"}}>I currently work here</label>
              </div>
              <div className="fg"><div className="lbl">Description</div><textarea rows={2} placeholder="Briefly describe your responsibilities…" value={e.description||""} onChange={v=>upEmp(i,"description",v.target.value)}/></div>
            </div>))}
          </div>

          {/* INTRO VIDEO */}
          <div className="card" style={{marginBottom:12}}>
            <div className="ct"><div className="ci ci-d">🎬</div><div><div className="c-title">Intro Video</div><div className="c-sub">Your Upwork profile intro video — freelancers with videos get 3x more invites</div></div>{!(profile.hasVideo||profile.videoUrl)&&<span style={{marginLeft:"auto",fontSize:11,background:"rgba(248,114,114,.1)",color:"var(--red)",border:"1px solid rgba(248,114,114,.2)",padding:"2px 8px",borderRadius:6}}>Missing</span>}</div>
            
            {/* Video display if URL found */}
            {profile.videoUrl&&(<div style={{marginBottom:12}}>
              <video controls style={{width:"100%",borderRadius:"var(--r)",background:"#000",maxHeight:200}} src={profile.videoUrl}>
                Your browser does not support video playback.
              </video>
              <div style={{fontSize:11,color:"var(--grn)",marginTop:5}}>✓ Video extracted from your Upwork profile</div>
            </div>)}

            {/* Manual video URL input */}
            {!profile.videoUrl&&(<div style={{marginBottom:10}}>
              <div className="lbl" style={{marginBottom:5}}>Paste your Upwork intro video URL (optional)</div>
              <input placeholder="https://www.upwork.com/..." value={profile.videoUrl||""} onChange={e=>up("videoUrl",e.target.value)} style={{fontFamily:"'DM Mono',monospace",fontSize:12}}/>
              <div className="hlp" style={{marginTop:4}}>Find this on your Upwork profile page — right-click your video → "Copy video address"</div>
            </div>)}

            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <button className="btn btn-dark btn-sm" onClick={()=>up("hasVideo",!profile.hasVideo)} style={{borderColor:profile.hasVideo||profile.videoUrl?"var(--grn)":"var(--b1)",color:profile.hasVideo||profile.videoUrl?"var(--grn)":"var(--m2)"}}>{profile.hasVideo||profile.videoUrl?"✓ I Have an Intro Video":"✓ I Have an Intro Video on Upwork"}</button>
              <a href="https://www.upwork.com/profile" target="_blank" style={{fontSize:11,color:"var(--gold)"}}>Add video on Upwork ↗</a>
            </div>
            {!(profile.hasVideo||profile.videoUrl)&&<div style={{fontSize:11,color:"var(--m1)",marginTop:8,lineHeight:1.6}}>💡 Record a 60-90 second video introducing yourself, your skills, and how you help clients. Freelancers with videos get significantly more invites.</div>}
          </div>

          {/* AI CONTEXT */}
          <div className="card gold" style={{marginBottom:16}}>
            <div className="ct"><div className="ci ci-g">🤖</div><div><div className="c-title">AI Context <span style={{fontSize:10,fontWeight:400,color:"var(--m1)"}}>(optional but powerful)</span></div><div className="c-sub">Private notes for Claude — never shown on Upwork</div></div></div>
            <textarea rows={3} placeholder="Your best achievements with numbers — e.g. 47 leads contacted in one workflow, saved client 5-7 hrs/day, 0 missed meetings after AI reminder system…" value={profile.aiContext||""} onChange={e=>up("aiContext",e.target.value)}/>
          </div>

          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>setSetupStep(method?1:0)}>← Back</button>
            <button className="btn btn-gold btn-lg" style={{flex:1}} onClick={save} disabled={msg==="saving"}>{msg==="saving"?<><span className="spin"/> Saving…</>:"✓ Save Profile & Start Grading →"}</button>
          </div>
        </div>)}
      </div>
    </div>);
  }

  // ── VIEW MODE (profile already set up) ──────────────────
  return(<div className="content fade">
    <div style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:14}}>
    <div>
      {/* IMPORT BANNER */}
      <div className="card gold" style={{marginBottom:14,padding:"13px 16px"}}>
        <div className="fx g12">
          <div style={{fontSize:20,flexShrink:0}}>📥</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>Update your profile from Upwork</div>
            <div style={{fontSize:11,color:"var(--m1)"}}>Re-import anytime after you update your Upwork profile to keep grades accurate.</div>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button className="btn btn-gold btn-sm" onClick={()=>{setMode("setup");setSetupStep(0);}}>↺ Re-import</button>
            <button className="btn btn-dark btn-sm" onClick={()=>setTab("optimizer")}>🎓 Grade →</button>
          </div>
        </div>
      </div>

      {/* PROFILE SUMMARY — read only with edit option */}
      <div className="card" style={{marginBottom:12}}>
        <div className="ct"><div className="ci ci-d">📷</div><div className="c-title">Profile Photo</div><span style={{marginLeft:"auto",fontSize:12,color:profile.hasPhoto?"var(--grn)":"var(--red)",fontWeight:600}}>{profile.hasPhoto?"✓ Added":"✗ Missing"}</span></div>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="ct"><div className="ci ci-d">🏷️</div><div><div className="c-title">Title</div></div></div>
        <div style={{fontSize:14,fontWeight:600,color:"var(--m2)"}}>{profile.title||<span style={{color:"var(--m1)",fontStyle:"italic"}}>Not set</span>}</div>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="ct"><div className="ci ci-d">💰</div><div className="c-title">Hourly Rate</div><span style={{marginLeft:"auto",fontSize:16,fontWeight:800,color:"var(--grn)"}}>{profile.hourlyRate?`$${profile.hourlyRate}/hr`:"Not set"}</span></div>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="ct"><div className="ci ci-d">✍️</div><div><div className="c-title">Overview</div><div className="c-sub">{profile.bio?.length||0} characters</div></div></div>
        <div style={{fontSize:12,color:"var(--m2)",lineHeight:1.7,display:"-webkit-box",WebkitLineClamp:4,WebkitBoxOrient:"vertical",overflow:"hidden",fontStyle:"italic"}}>{profile.bio||<span style={{color:"var(--m1)"}}>Not set</span>}</div>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="ct"><div className="ci ci-d">⚡</div><div><div className="c-title">Skills</div><div className="c-sub">{skillArr.length} skills</div></div></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{skillArr.slice(0,12).map(s=>(<span key={s} style={{fontSize:11,background:"var(--s2)",border:"1px solid var(--b1)",color:"var(--m2)",padding:"3px 10px",borderRadius:20}}>{s}</span>))}{skillArr.length>12&&<span style={{fontSize:11,color:"var(--m1)"}}>+{skillArr.length-12} more</span>}</div>
      </div>
      {/* VIDEO in view mode */}
      <div className="card" style={{marginBottom:12}}>
        <div className="ct"><div className="ci ci-d">🎬</div><div className="c-title">Intro Video</div><span style={{marginLeft:"auto",fontSize:12,color:(profile.hasVideo||profile.videoUrl)?"var(--grn)":"var(--red)",fontWeight:600}}>{(profile.hasVideo||profile.videoUrl)?"✓ Added":"✗ Missing"}</span></div>
        {profile.videoUrl&&(<video controls style={{width:"100%",borderRadius:"var(--r)",background:"#000",maxHeight:180,marginTop:4}} src={profile.videoUrl}/>)}
        {!profile.videoUrl&&(profile.hasVideo)&&<div style={{fontSize:12,color:"var(--grn)"}}>✓ Intro video confirmed on Upwork</div>}
        {!profile.hasVideo&&!profile.videoUrl&&<div style={{fontSize:12,color:"var(--m1)",fontStyle:"italic"}}>No intro video — freelancers with videos get 3x more invites</div>}
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="ct"><div className="ci ci-d">💼</div><div><div className="c-title">Work History</div><div className="c-sub">{(profile.employment||[]).filter(e=>e.company?.trim()).length} jobs</div></div></div>
        {(profile.employment||[]).filter(e=>e.company?.trim()).slice(0,3).map((e,i)=>(<div key={i} style={{padding:"8px 0",borderBottom:"1px solid var(--b1)"}}><div style={{fontSize:13,fontWeight:600}}>{e.title||"Role"} <span style={{color:"var(--m1)",fontWeight:400}}>at</span> {e.company}</div><div style={{fontSize:11,color:"var(--m1)"}}>{e.from||"?"} – {e.current?"Present":e.to||"?"}</div></div>))}
        {!(profile.employment||[]).some(e=>e.company?.trim())&&<div style={{fontSize:12,color:"var(--m1)",fontStyle:"italic"}}>No work history added</div>}
      </div>

      <div className="fx g10">
        <button className="btn btn-dark btn-sm" onClick={()=>{setMode("setup");setSetupStep(2);}}>✏️ Edit Profile</button>
        <button className="btn btn-gold" onClick={()=>setTab("optimizer")}>🎓 Grade My Profile →</button>
      </div>
    </div>

    {/* SIDEBAR */}
    <div><div className="card" style={{position:"sticky",top:0}}>
      <div className="ct"><div className="ci ci-g">📊</div><div className="c-title">Profile Score</div></div>
      <Ring score={score}/>
      <div style={{fontSize:12,fontWeight:700,color:score>=80?"var(--grn)":score>=50?"var(--gold)":"var(--red)",marginTop:8,marginBottom:14,textAlign:"center"}}>{score>=80?"Ready to rank on Upwork!":score>=50?"Good — a few things to add":"Complete your profile"}</div>
      {[["📷 Photo",profile.hasPhoto?100:0],["🏷️ Title",profile.title?.length>=20?100:profile.title?50:0],["✍️ Overview",Math.min(100,((profile.bio?.length||0)/400)*100)],["⚡ Skills",Math.min(100,(skillArr.length/15)*100)],["💼 Work History",profile.employment?.some(e=>e.company)?100:0],["💰 Rate",profile.hourlyRate?100:0],["🎬 Video",(profile.hasVideo||profile.videoUrl)?100:0]].map(([l,v])=>(<div key={l} className="bar-r"><div className="bar-lb" style={{fontSize:10,width:90}}>{l}</div><div className="bar-bg"><div className="bar-fl" style={{width:`${v}%`,background:v>=80?"var(--grn)":v>=50?"var(--gold)":"var(--red)"}}/></div><div className="bar-pc">{Math.round(v)}%</div></div>))}
      <button className="btn btn-gold btn-full btn-sm" style={{marginTop:14}} onClick={()=>setTab("optimizer")}>🎓 Grade My Profile →</button>
    </div></div>
    </div>
  </div>);
}

// THUMBNAIL GENERATOR
// 8 themes + custom color picker
// ═══════════════════════════════════════
function ThumbnailGenerator({profile}){
  const [style,setStyle]=useState("dark");
  const [customAccent,setCustomAccent]=useState("");
  const [customBg,setCustomBg]=useState("");
  const [tagline,setTagline]=useState("");
  const [stat1,setStat1]=useState("");
  const [stat2,setStat2]=useState("");
  const [downloading,setDownloading]=useState(false);
  const canvasRef=useRef(null);

  const name=(profile.name||"Your Name").split(" ").slice(0,2).join(" ").toUpperCase();
  const titleStr=(profile.title||"Freelancer").split("|")[0].trim();
  const initStr=initials(profile.name||"Y N");

  const STYLES={
    dark:    {label:"⚫ Dark",      bg:"#09090e",accent:"#e9a025",text:"#ffffff",sub:"#b8b8d0",card:"#16161f",border:"#252535"},
    gold:    {label:"🟡 Gold",      bg:"#1a1200",accent:"#f6c460",text:"#ffffff",sub:"#fde68a",card:"#251a00",border:"#4a3500"},
    blue:    {label:"🔵 Blue",      bg:"#050d1a",accent:"#62a7fb",text:"#ffffff",sub:"#93c5fd",card:"#0a1628",border:"#1e3a5f"},
    green:   {label:"🟢 Green",     bg:"#051a0d",accent:"#35d49a",text:"#ffffff",sub:"#6ee7b7",card:"#071f10",border:"#134d2a"},
    purple:  {label:"🟣 Purple",    bg:"#0d0519",accent:"#9d70ff",text:"#ffffff",sub:"#c4b5fd",card:"#130a24",border:"#2e1065"},
    warm:    {label:"🟤 Warm/African",bg:"#1a0a00",accent:"#f97316",text:"#ffffff",sub:"#fed7aa",card:"#1f0e00",border:"#7c2d12"},
    minimal: {label:"⬜ Minimal",   bg:"#f8fafc",accent:"#0f172a",text:"#0f172a",sub:"#475569",card:"#e2e8f0",border:"#cbd5e1"},
    neon:    {label:"⚡ Neon Tech", bg:"#000000",accent:"#00ff88",text:"#ffffff",sub:"#00cc6a",card:"#0a0a0a",border:"#00ff8833"},
    custom:  {label:"🎨 Custom",    bg:"#09090e",accent:"#e9a025",text:"#ffffff",sub:"#b8b8d0",card:"#16161f",border:"#252535"},
  };

  const getStyle=()=>{
    const s={...STYLES[style]};
    if(style==="custom"){
      if(customAccent) s.accent=customAccent;
      if(customBg){s.bg=customBg;s.card=customBg+"cc";}
    }
    return s;
  };

  useEffect(()=>{
    const ctx=profile.aiContext||profile.bio||"";
    const matches=ctx.match(/\d+[\w\s%-]*/g)||[];
    if(matches[0]&&!stat1) setStat1(matches[0].trim().slice(0,30));
    if(matches[1]&&!stat2) setStat2(matches[1].trim().slice(0,30));
    if(!tagline) setTagline(titleStr.slice(0,40));
  },[profile]);

  const drawThumbnail=()=>{
    const canvas=canvasRef.current;
    if(!canvas) return;
    const ctx=canvas.getContext("2d");
    const W=1280,H=720;
    canvas.width=W;canvas.height=H;
    const s=getStyle();

    // Background
    ctx.fillStyle=s.bg;
    ctx.fillRect(0,0,W,H);

    // Grid pattern
    ctx.strokeStyle=s.text==="#0f172a"?"rgba(0,0,0,0.05)":"rgba(255,255,255,0.03)";
    ctx.lineWidth=1;
    for(let i=0;i<W;i+=48){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
    for(let i=0;i<H;i+=48){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}

    // Left accent bar gradient
    const barGrad=ctx.createLinearGradient(0,0,0,H);
    barGrad.addColorStop(0,s.accent);
    barGrad.addColorStop(0.5,s.accent+"88");
    barGrad.addColorStop(1,"transparent");
    ctx.fillStyle=barGrad;
    ctx.fillRect(0,0,8,H);

    // Glow behind avatar
    const glowGrad=ctx.createRadialGradient(220,360,0,220,360,200);
    glowGrad.addColorStop(0,s.accent+"30");
    glowGrad.addColorStop(1,"transparent");
    ctx.fillStyle=glowGrad;
    ctx.fillRect(0,0,W,H);

    // Avatar outer ring
    ctx.beginPath();ctx.arc(220,360,145,0,Math.PI*2);
    ctx.strokeStyle=s.accent+"44";ctx.lineWidth=2;ctx.stroke();

    // Avatar circle
    ctx.beginPath();ctx.arc(220,360,130,0,Math.PI*2);
    ctx.fillStyle=s.card;ctx.fill();
    ctx.strokeStyle=s.accent;ctx.lineWidth=4;ctx.stroke();

    // Avatar initials
    ctx.fillStyle=s.accent;
    ctx.font=`bold 76px Arial`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(initStr,220,360);

    // Vertical divider
    const divGrad=ctx.createLinearGradient(0,80,0,H-80);
    divGrad.addColorStop(0,"transparent");
    divGrad.addColorStop(0.2,s.border);
    divGrad.addColorStop(0.8,s.border);
    divGrad.addColorStop(1,"transparent");
    ctx.fillStyle=divGrad;
    ctx.fillRect(395,80,2,H-160);

    // Right content
    const rx=430;

    // Brand pill
    ctx.fillStyle=s.accent+"25";
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(rx,75,240,38,8);
    else ctx.rect(rx,75,240,38);
    ctx.fill();
    ctx.strokeStyle=s.accent+"60";ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=s.accent;
    ctx.font="bold 15px Arial";
    ctx.textAlign="left";ctx.textBaseline="middle";
    ctx.fillText("✦ FreelancEdge  |  Upwork Profile",rx+14,94);

    // Name
    const nameSize=name.length>12?56:68;
    ctx.fillStyle=s.text;
    ctx.font=`bold ${nameSize}px Arial`;
    ctx.textBaseline="top";
    ctx.fillText(name.length>16?name.slice(0,16)+"…":name,rx,135);

    // Tagline
    ctx.fillStyle=s.accent;
    ctx.font="bold 26px Arial";
    ctx.fillText(tagline.length>42?tagline.slice(0,42)+"…":tagline,rx,222);

    // Divider line
    const lineGrad=ctx.createLinearGradient(rx,0,rx+800,0);
    lineGrad.addColorStop(0,s.accent);
    lineGrad.addColorStop(1,"transparent");
    ctx.fillStyle=lineGrad;

        else ctx.rect(bx+3,by+3,bw,100);

        // Box
        ctx.fillStyle=s.card;
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(bx,by,bw,100,10);
        else ctx.rect(bx,by,bw,100);
        ctx.fill();
        ctx.strokeStyle=s.accent+"55";ctx.lineWidth=1;ctx.stroke();
        // Left accent bar on stat box
        ctx.fillStyle=s.accent;
        ctx.fillRect(bx,by,4,100);
        // Stat text
        ctx.fillStyle=s.accent;
        ctx.font="bold 28px Arial";
        ctx.textAlign="left";ctx.textBaseline="middle";

    // Industry tags

        ctx.fillStyle=s.accent+"18";

        else ctx.rect(tx,ty,sw,28);
        ctx.fill();
        ctx.strokeStyle=s.accent+"40";ctx.lineWidth=1;ctx.stroke();
        ctx.fillStyle=s.sub;
        ctx.textAlign="left";ctx.textBaseline="middle";
        ctx.fillText(sk.trim(),tx+12,ty+14);
        tx+=sw+10;
      });
    }

    // Bottom tagline
    ctx.fillStyle=s.sub;
    ctx.font="22px Arial";
    ctx.textAlign="left";ctx.textBaseline="middle";
    ctx.fillText("Hire me on Upwork — AI-powered results for your business",rx,H-60);

    // Bottom accent line
    const blineGrad=ctx.createLinearGradient(rx,0,W,0);
    blineGrad.addColorStop(0,s.accent);
    blineGrad.addColorStop(1,"transparent");
    ctx.fillStyle=blineGrad;
    ctx.fillRect(rx,H-28,W-rx,3);
  };

  useEffect(()=>{setTimeout(drawThumbnail,100);},[style,tagline,stat1,stat2,customAccent,customBg,profile]);

  const download=()=>{

  return(<div className="card" style={{marginBottom:14}}>

    {/* STYLE PICKER */}

      <div className="lbl" style={{marginBottom:8}}>Choose a Style</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7}}>

    </div>

    {/* CUSTOM COLOR PICKER */}
    {style==="custom"&&(<div className="gr gr2" style={{marginBottom:12,background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:"var(--r)",padding:"12px"}}>
      <div className="fg"><div className="lbl">Accent Color</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="color" value={customAccent||"#e9a025"} onChange={e=>{setCustomAccent(e.target.value);setTimeout(drawThumbnail,50);}} style={{width:44,height:36,border:"1px solid var(--b1)",borderRadius:6,cursor:"pointer",padding:2,background:"var(--s1)"}}/>
          <input placeholder="#e9a025" value={customAccent} onChange={e=>{setCustomAccent(e.target.value);setTimeout(drawThumbnail,50);}} style={{flex:1,fontFamily:"'DM Mono',monospace",fontSize:12}}/>
        </div>
      </div>
      <div className="fg"><div className="lbl">Background Color</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="color" value={customBg||"#09090e"} onChange={e=>{setCustomBg(e.target.value);setTimeout(drawThumbnail,50);}} style={{width:44,height:36,border:"1px solid var(--b1)",borderRadius:6,cursor:"pointer",padding:2,background:"var(--s1)"}}/>
          <input placeholder="#09090e" value={customBg} onChange={e=>{setCustomBg(e.target.value);setTimeout(drawThumbnail,50);}} style={{flex:1,fontFamily:"'DM Mono',monospace",fontSize:12}}/>
        </div>
      </div>
    </div>)}

    {/* CONTENT CONTROLS */}
    <div className="gr gr2" style={{marginBottom:12}}>
      <div className="fg"><div className="lbl">Your Tagline / Specialty</div><input placeholder="e.g. AI Automation Expert" value={tagline} onChange={e=>{setTagline(e.target.value);setTimeout(drawThumbnail,50);}}/></div>
      <div className="fg"><div className="lbl">Key Result 1</div><input placeholder="e.g. 47 Leads in One Workflow" value={stat1} onChange={e=>{setStat1(e.target.value);setTimeout(drawThumbnail,50);}}/></div>
      <div className="fg"><div className="lbl">Key Result 2</div><input placeholder="e.g. 5-7 Hours Saved Daily" value={stat2} onChange={e=>{setStat2(e.target.value);setTimeout(drawThumbnail,50);}}/></div>
    </div>

    {/* PREVIEW */}
    <div style={{borderRadius:"var(--rl)",overflow:"hidden",border:"2px solid var(--b1)",marginBottom:12,background:"#000",position:"relative"}}>
      <canvas ref={canvasRef} style={{width:"100%",display:"block"}}/>
      <div style={{position:"absolute",top:8,right:8,fontSize:10,background:"rgba(0,0,0,.6)",color:"#fff",padding:"3px 8px",borderRadius:4}}>1280×720 Preview</div>
    </div>

    {/* ACTIONS */}
    <div style={{display:"flex",gap:10}}>
      <button className="btn btn-gold btn-lg" style={{flex:1}} onClick={download} disabled={downloading}>
        {downloading?<><span className="spin-dark"/> Preparing…</>:"⬇️ Download Thumbnail PNG"}
      </button>
      <button className="btn btn-dark btn-sm" onClick={()=>setTimeout(drawThumbnail,50)}>↺ Refresh</button>
    </div>
    <div style={{fontSize:11,color:"var(--m1)",marginTop:7}}>1280×720px · Perfect for Upwork video thumbnail · High quality PNG · Free to use</div>
  </div>);
}

const GRADE_CHART={"A+":{color:"#35d49a",bg:"rgba(53,212,154,.12)",border:"rgba(53,212,154,.3)",desc:"Top-tier: fully optimized, client-ready, built to attract invites."},"A":{color:"#35d49a",bg:"rgba(53,212,154,.08)",border:"rgba(53,212,154,.2)",desc:"Almost there — strong profile, a few tweaks could make it standout."},"B":{color:"#e9a025",bg:"rgba(233,160,37,.1)",border:"rgba(233,160,37,.25)",desc:"Solid foundation, but strategic adjustments could make you far more appealing."},"C":{color:"#f6c460",bg:"rgba(246,196,96,.1)",border:"rgba(246,196,96,.25)",desc:"On the radar, but lacking clarity, keywords, or polish to truly compete."},"D":{color:"#f87272",bg:"rgba(248,114,114,.1)",border:"rgba(248,114,114,.25)",desc:"Important elements missing — clients may be skipping over you."},"F":{color:"#f87272",bg:"rgba(248,114,114,.12)",border:"rgba(248,114,114,.3)",desc:"Major overhaul needed — it's time for a complete reset."}};
function scoreToGrade(s){if(s>=93)return"A+";if(s>=83)return"A";if(s>=70)return"B";if(s>=55)return"C";if(s>=40)return"D";return"F";}

function ProfileOptimizer({profile,setProfile}){
  const [activeTab,setActiveTab]=useState("grade");
  const [industry,setIndustry]=useState(""); const [targetClients,setTargetClients]=useState("");
  const [loading,setLoading]=useState({}); const [results,setResults]=useState({});
  const [applying,setApplying]=useState({}); const [applied,setApplied]=useState({});
  const [gradeData,setGradeData]=useState(null); const [gradeLoading,setGradeLoading]=useState(false);

  const [abVariantA,setAbVariantA]=useState(""); const [abVariantB,setAbVariantB]=useState(""); const [abField,setAbField]=useState("title");

  const [compNiche,setCompNiche]=useState("");
  const [gradeHistory,setGradeHistory]=useState(()=>stor.get("fe_grade_history",[]));

  const taRefs={bio:useRef(null)};

  const pCtx=`FREELANCER PROFILE FOR UPWORK GRADING:
Title: ${profile.title||"NOT SET"}
Hourly Rate: $${profile.hourlyRate||"NOT SET"}/hr
Overview/Bio: ${profile.bio||"NOT SET"}
Skills: ${profile.skills||"NOT SET"}
Employment History: ${profile.employment?.filter(e=>e.company?.trim()).map(e=>`${e.title||"Role"} at ${e.company} (${e.from||"?"}–${e.current?"Present":e.to||"?"}): ${e.description||"No description"}`).join(" | ")||"NONE ADDED"}
Profile Photo: ${profile.hasPhoto?"YES - photo uploaded":"NO - missing"}
Intro Video: ${profile.hasVideo||profile.videoUrl?"YES - intro video present":"NO - missing (freelancers with videos get 3x more invites)"}
Languages: ${profile.languages?.map(l=>`${l.language} (${l.level})`).join(", ")||"English (assumed)"}`;

  const gradeProfile=async()=>{
    setGradeLoading(true);setGradeData(null);
    const sys=`You are an expert Upwork profile grader. Grade this freelancer profile ONLY based on these 7 fields that Upwork's algorithm actually uses:

Score each 0-100. Calculate overall as weighted average. Return ONLY JSON:
{"title_score":number,"bio_score":number,"skills_score":number,"employment_score":number,"photo_score":number,"rate_score":number,"video_score":number,"overall_score":number,"title_verdict":"string","bio_verdict":"string","skills_verdict":"string","employment_verdict":"string","photo_verdict":"string","rate_verdict":"string","video_verdict":"string","top_wins":["string","string","string"],"top_fixes":["string","string","string"],"detailed_feedback":"string"}`;
    try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":window._feApiKey||"","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:700,system:sys,messages:[{role:"user",content:`Grade this Upwork profile:\n${pCtx}\nIndustry: ${industry||"general"}\nIdeal client: ${targetClients||"not specified"}`}]})});const data=await res.json();if(data.error){throw new Error(data.error.message||JSON.stringify(data.error));}const raw=data.content?.find(b=>b.type==="text")?.text||"{}";const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());setGradeData(parsed);const entry={date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),score:parsed.overall_score,grade:scoreToGrade(parsed.overall_score)};const newHist=[entry,...gradeHistory].slice(0,10);setGradeHistory(newHist);stor.set("fe_grade_history",newHist);}catch(err){console.error("Grade error:",err);setGradeData({error:"Could not grade: "+(err.message||"API error. Check console for details.")});}finally{setGradeLoading(false);}

  const applySection=(section)=>{

function History({history,setHistory}){
  const [expanded,setExpanded]=useState(null); const [filter,setFilter]=useState("all");
  const filtered=filter==="all"?history:history.filter(h=>h.status===filter);
  const updStatus=(id,st)=>setHistory(h=>h.map(x=>x.id===id?{...x,status:st}:x));
  const del=id=>setHistory(h=>h.filter(x=>x.id!==id));
  return(<div className="content fade">
    <div className="fx g8" style={{marginBottom:18}}><div><div style={{fontSize:17,fontWeight:800}}>Proposal History</div><div style={{fontSize:11,color:"var(--m1)"}}>{history.length} proposals</div></div><div className="fx g4 mla">{["all","sent","viewed","replied","archived"].map(s=>(<button key={s} className="btn btn-dark btn-xs" style={{borderColor:filter===s?"var(--gold)":"var(--b1)",color:filter===s?"var(--gold)":"var(--m2)",textTransform:"capitalize"}} onClick={()=>setFilter(s)}>{s}</button>))}</div></div>
    {filtered.length===0?(<div className="empty"><div className="empty-ico">📭</div><div className="empty-t">No proposals {filter!=="all"?`with status "${filter}"`:"yet"}</div><div className="empty-d">Generate and save a proposal to see it here.</div></div>):filtered.map(h=>(<div key={h.id} className="hi"><div className="hi-top"><div style={{flex:1}}><div className="hi-job">{h.jobTitle}</div><div className="hi-meta">{h.date}{h.tone&&` · ${h.tone}`}</div></div><span className={`sp sp-${h.status}`}>{h.status}</span></div><div className="hi-prev">{h.proposal}</div><div className="hi-act"><button className="btn btn-dark btn-xs" onClick={()=>setExpanded(expanded===h.id?null:h.id)}>{expanded===h.id?"Collapse":"Read Full"}</button><button className="btn btn-ghost btn-xs" onClick={()=>navigator.clipboard.writeText(h.proposal)}>Copy</button><div className="fx g4 mla"><div style={{fontSize:11,color:"var(--m1)"}}>Status:</div><select className="st-s" value={h.status} onChange={e=>updStatus(h.id,e.target.value)}><option value="sent">Sent</option><option value="viewed">Viewed</option><option value="replied">Replied ✓</option><option value="archived">Archived</option></select><button className="btn btn-red btn-xs" onClick={()=>del(h.id)}>×</button></div></div>{expanded===h.id&&<div className="fade" style={{marginTop:11,background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:"var(--r)",padding:13,fontSize:13,lineHeight:1.85,whiteSpace:"pre-wrap"}}>{h.proposal}</div>}</div>))}
  </div>);
}

function Extension({profile}){

          {epState==="done"&&<div className="fade"><div className="ep-lbl" style={{marginBottom:4}}>Your proposal</div><Toolbar taRef={epRef} value={epProp} onChange={setEpProp}/><textarea ref={epRef} style={{width:"100%",border:"1px solid var(--b1)",borderRadius:6,background:"var(--s2)",color:"var(--txt)",fontSize:11,lineHeight:1.75,padding:9,resize:"none"}} value={epProp} onChange={e=>setEpProp(e.target.value)} rows={6}/><button className="btn btn-gold btn-full btn-sm mt8" onClick={()=>{navigator.clipboard.writeText(epProp);setEpCopied(true);setTimeout(()=>setEpCopied(false),2000);}}>{epCopied?"✓ Copied!":"Copy & paste into Upwork"}</button></div>}
