    <div style={{marginBottom:18}}><div style={{fontSize:17,fontWeight:800}}>Community & Resources</div><div style={{fontSize:11,color:"var(--m1)"}}>You're not alone on your Upwork journey</div></div>
    <div className="card gold" style={{marginBottom:18,textAlign:"center",padding:"32px 24px"}}><div style={{fontSize:32,marginBottom:11}}>🏆</div><div style={{fontSize:20,fontWeight:900,marginBottom:7}}>Join 1,000+ Upwork Freelancers</div><div style={{fontSize:13,color:"var(--m2)",lineHeight:1.7,maxWidth:460,margin:"0 auto 18px"}}>Exclusive courses, weekly masterminds, strategy sessions, and a community of freelancers serious about growing on Upwork.</div><button className="btn btn-gold btn-lg">Join the Community →</button></div>
    <div className="cm-g">{[{ico:"🎓",t:"Free Courses",d:"Video library on Upwork profile optimization, proposal writing, and winning strategies."},{ico:"🧠",t:"Weekly Mastermind",d:"Live sessions with successful freelancers every Thursday. Ask questions, share wins."},{ico:"📰",t:"Newsletter",d:"Weekly tips, Upwork algorithm updates, and curated opportunities in your inbox."},{ico:"💬",t:"Private Forum",d:"Connect with 1,000+ freelancers. Share proposals for feedback, ask strategy questions."}].map(r=>(<div key={r.t} className="cm-c"><div className="cm-ico">{r.ico}</div><div className="cm-t">{r.t}</div><div className="cm-d">{r.d}</div></div>))}</div>
  </div>);
}

// ═══════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════
function MainApp({session,onSignOut}){
  const [tab,setTab]=useState("dashboard");
  const [plan,setPlan]=useState(()=>stor.get("fe_plan","free"));
  const [usage,setUsage]=useState(()=>stor.get("fe_usage",0));
  const [history,setHistory]=useState(()=>stor.get("fe_history",[]));
  const [templates,setTemplates]=useState(()=>stor.get("fe_templates",DEFAULT_TEMPLATES));
  const [profiles,setProfiles]=useState(()=>stor.get("fe_profiles",[{...EMPTY_PROFILE}]));
  const [activeId,setActiveId]=useState(()=>stor.get("fe_activeId","p1"));

  useEffect(()=>stor.set("fe_plan",plan),[plan]);
  useEffect(()=>stor.set("fe_usage",usage),[usage]);
  useEffect(()=>stor.set("fe_history",history),[history]);
  useEffect(()=>stor.set("fe_templates",templates),[templates]);
  useEffect(()=>stor.set("fe_profiles",profiles),[profiles]);
  useEffect(()=>stor.set("fe_activeId",activeId),[activeId]);

  const user=session.user;
  const userName=user?.user_metadata?.full_name||user?.email?.split("@")[0]||"User";

  const activeProfile=profiles.find(p=>p.id===activeId)||profiles[0]||EMPTY_PROFILE;
  const setActiveProfile=upd=>setProfiles(ps=>ps.map(p=>p.id===activeId?(typeof upd==="function"?upd(p):upd):p));
  const addProfile=()=>{const id="p"+Date.now();setProfiles(ps=>[...ps,{...EMPTY_PROFILE,id,isDefault:false}]);setActiveId(id);};
  const handleImported=profile=>{setProfiles(ps=>{const exists=ps.find(p=>p.id===activeId);if(exists&&!exists.name){return ps.map(p=>p.id===activeId?{...profile,id:activeId}:p);}return[...ps,profile];});setActiveId(profile.id||activeId);};
  const addHistory=entry=>setHistory(h=>[entry,...h]);

  const planInfo=PLANS[plan],usedPct=Math.min(100,Math.round(usage/planInfo.proposals*100));

  const NAV=[
    {id:"dashboard",label:"Dashboard",icon:"⊞",group:"main"},
    {id:"generate",label:"Generate",icon:"✦",group:"main"},
    {id:"import",label:"Import from Upwork",icon:"📥",group:"main"},
    {id:"jobs",label:"Saved Jobs",icon:"🔍",group:"main",badge:MOCK_JOBS.length},
    {id:"history",label:"History",icon:"◷",group:"main",badge:history.length||null},
    {id:"profile",label:"My Profile",icon:"◉",group:"tools"},
    {id:"optimizer",label:"Profile Optimizer",icon:"🚀",group:"tools"},
    {id:"templates",label:"Templates",icon:"◧",group:"tools",badge:templates.filter(t=>!DEFAULT_TEMPLATES.some(d=>d.id===t.id)).length||null},
    {id:"extension",label:"Extension",icon:"🔌",group:"tools"},
    {id:"community",label:"Community",icon:"🏆",group:"more"},
    {id:"pricing",label:"Pricing",icon:"💎",group:"more"},
  ];

  const PAGE={dashboard:["Dashboard","Your Upwork performance at a glance"],generate:["Generate Proposal","AI-crafted cover letters in seconds"],import:["Import Upwork Profile","Transfer your Upwork data to FreelancEdge"],jobs:["Saved Jobs","Jobs saved from your Upwork browsing"],history:["Proposal History","Track all your sent proposals"],profile:["My Profile","Your 6 Upwork profile fields"],optimizer:["Profile Optimizer","Grade · Optimize · Video Scripts · Compare · Track Progress"],templates:["Templates","Manage your proposal strategies"],extension:["Chrome Extension","One-click applying on Upwork"],community:["Community","Resources and events for Upwork success"],pricing:["Pricing & Plans","Choose the right plan for you"]};

  return(<div className="shell">
    <div className="sb">
      <div className="sb-logo"><div className="logo-mark">FE</div><div><div className="logo-name">Freelanc<em>Edge</em></div></div></div>
      <ProfileSwitcher profiles={profiles} activeId={activeId} setActiveId={setActiveId} addProfile={addProfile} plan={plan}/>
      <div className="sb-nav">
        {["main","tools","more"].map(group=>{const items=NAV.filter(n=>n.group===group);const labels={main:"",tools:"Tools",more:"More"};return(<div key={group}>{labels[group]&&<div className="ng">{labels[group]}</div>}{items.map(n=>(<button key={n.id} className={`ni ${tab===n.id?"on":""}`} onClick={()=>setTab(n.id)}><span className="ni-ico">{n.icon}</span>{n.label}{n.badge?<span className="ni-badge">{n.badge}</span>:null}</button>))}</div>);})}
      </div>
      <div className="sb-ft"><div className="plan-box"><div className="plan-nm">{planInfo.name} Plan</div><div className="plan-us">{usage} / {planInfo.proposals} proposals</div><div className="plan-bar"><div className="plan-fill" style={{width:`${usedPct}%`,background:usedPct>85?"var(--red)":"var(--gold)"}}/></div>{plan==="free"&&<button className="up-btn" onClick={()=>setTab("pricing")}>Upgrade Plan ↗</button>}</div></div>
    </div>
    <div className="main">
      <div className="topbar">
        <div className="tb-title">{PAGE[tab]?.[0]||tab}</div><div className="tb-sep"/><div className="tb-sub">{PAGE[tab]?.[1]||""}</div>
        <div className="tb-actions">
          {tab!=="generate"&&<button className="btn btn-gold btn-sm" onClick={()=>setTab("generate")}>✦ Generate</button>}
          {tab!=="import"&&<button className="btn btn-dark btn-sm" onClick={()=>setTab("import")}>📥 Import from Upwork</button>}
          <div style={{display:"flex",alignItems:"center",gap:8,background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:7,padding:"5px 10px"}}>
            <div style={{width:22,height:22,background:"linear-gradient(135deg,var(--gold),#b06808)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#000"}}>{initials(userName)}</div>
            <div style={{fontSize:12,fontWeight:500}}>{userName}</div>
          </div>
          <button className="signout-btn" onClick={onSignOut}>Sign out</button>
        </div>
      </div>
      {tab==="dashboard"&&<Dashboard profile={activeProfile} history={history} usage={usage} plan={plan} setTab={setTab} userName={userName}/>}
      {tab==="generate"&&<Generate profile={activeProfile} templates={templates} addHistory={addHistory} usage={usage} setUsage={setUsage} plan={plan}/>}
      {tab==="import"&&<Import onImported={handleImported} setTab={setTab}/>}
      {tab==="jobs"&&<Jobs setTab={setTab}/>}
      {tab==="history"&&<History history={history} setHistory={setHistory}/>}
      {tab==="profile"&&<ProfileSetup profile={activeProfile} setProfile={setActiveProfile} setTab={setTab}/>}
      {tab==="optimizer"&&<ProfileOptimizer profile={activeProfile} setProfile={setActiveProfile}/>}
      {tab==="templates"&&<Templates templates={templates} setTemplates={setTemplates}/>}
      {tab==="extension"&&<Extension profile={activeProfile}/>}
      {tab==="community"&&<Community/>}
      {tab==="pricing"&&<Pricing plan={plan} setPlan={setPlan}/>}
    </div>
  </div>);
}

// ═══════════════════════════════════════
// ROOT — AUTH GATE
// ═══════════════════════════════════════
function App(){
  const [session,setSession]=useState(undefined);
  useEffect(()=>{
    supabaseAuth.handleOAuthCallback().then(oauthSession=>{
      if(oauthSession){setSession(oauthSession);return;}
      fakeAuth.getSession().then(({data:{session:s}})=>setSession(s||null));
    });
  },[]);
  const handleAuth=s=>setSession(s);
  const handleSignOut=async()=>{await fakeAuth.signOut();setSession(null);};

  if(session===undefined) return(<div style={{minHeight:"100vh",background:"#09090e",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{textAlign:"center"}}><div style={{width:40,height:40,background:"linear-gradient(135deg,#e9a025,#a06000)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace",fontWeight:600,color:"#000",margin:"0 auto 16px",fontSize:16}}>FE</div><div style={{color:"#8888a8",fontSize:13}}>Loading FreelancEdge…</div></div></div>);

  if(!session) return <AuthPage onAuth={handleAuth}/>;
  return <MainApp session={session} onSignOut={handleSignOut}/>;
}

// ═══════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════
injectCSS();
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
